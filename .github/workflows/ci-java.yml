# CI Workflow for the Java/Spring Boot backend
# Runs a compile check (no tests) on PRs targeting main or development

name: CI - Java Backend

on:
  pull_request:
    branches: [main, development]
    paths:
      - "backend-java/**"

jobs:
  compile:
    name: Compile Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend-java

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
          cache-dependency-path: backend-java/**/build.gradle.kts

      - name: Compile and assemble
        run: ./gradlew build -x test

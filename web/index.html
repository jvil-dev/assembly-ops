<!-- web/index.html
 Landing page for assemblyops.org. Static HTML scaffold - loads DM Sans via Google Fonts,
 links styles.css -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AssemblyOps</title>
    <meta
      name="description"
      content="Event management platform for JW assemblies and conventions." />

    <!-- Open Graph -->
    <meta property="og:title" content="AssemblyOps" />
    <meta
      property="og:description"
      content="Event management platform for JW assemblies and conventions." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet" />

    <!-- Styles-->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <img src="logo.png" alt="AssemblyOps logo" class="logo" />
    </main>
  </body>
</html>

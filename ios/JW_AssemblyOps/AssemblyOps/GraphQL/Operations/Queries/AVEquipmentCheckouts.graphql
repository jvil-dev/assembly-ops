query AVEquipmentCheckouts($eventId: ID!, $checkedIn: Boolean) {
  avEquipmentCheckouts(eventId: $eventId, checkedIn: $checkedIn) {
    id
    equipment {
      id
      name
      category
    }
    checkedOutBy {
      id
      user {
        firstName
        lastName
      }
    }
    checkedOutAt
    checkedInAt
    session {
      id
      name
    }
    notes
  }
}

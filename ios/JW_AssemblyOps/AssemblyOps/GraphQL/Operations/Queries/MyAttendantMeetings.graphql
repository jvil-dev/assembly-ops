query MyAttendantMeetings($eventId: ID!) {
  myAttendantMeetings(eventId: $eventId) {
    id
    session {
      id
      name
      date
    }
    meetingDate
    notes
    createdBy {
      id
      firstName
      lastName
    }
    attendees {
      id
      eventVolunteer {
        id
        user {
          firstName
          lastName
        }
      }
    }
    createdAt
  }
}

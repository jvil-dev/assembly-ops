query MyAssignments {
  myAssignments {
    id
    status
    isCaptain
    respondedAt
    declineReason
    acceptDeadline
    forceAssigned
    post {
      id
      name
      location
      capacity
      department {
        id
        name
        departmentType
      }
    }
    session {
      id
      name
      date
      startTime
      endTime
    }
    checkIn {
      id
      status
      checkInTime
      checkOutTime
    }
  }
}

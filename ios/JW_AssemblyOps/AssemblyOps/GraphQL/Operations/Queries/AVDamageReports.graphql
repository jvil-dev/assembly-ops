query AVDamageReports($eventId: ID!, $resolved: Boolean) {
  avDamageReports(eventId: $eventId, resolved: $resolved) {
    id
    equipment {
      id
      name
      category
    }
    description
    severity
    reportedBy {
      id
      user {
        firstName
        lastName
      }
    }
    session {
      id
      name
    }
    resolved
    resolvedAt
    resolvedBy {
      id
      firstName
      lastName
    }
    resolutionNotes
    createdAt
  }
}

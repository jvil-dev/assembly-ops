query EventAttendanceSummary($eventId: ID!) {
  eventAttendanceSummary(eventId: $eventId) {
    session {
      id
      name
      date
      startTime
      endTime
    }
    totalCount
    sectionCounts {
      id
      count
      section
      notes
      submittedBy {
        id
        firstName
        lastName
      }
      createdAt
      updatedAt
    }
  }
}

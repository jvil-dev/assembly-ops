query Shifts($sessionId: ID!, $postId: ID) {
  shifts(sessionId: $sessionId, postId: $postId) {
    id
    name
    startTime
    endTime
    session {
      id
      name
    }
    post {
      id
      name
    }
    createdAt
    createdBy {
      id
      firstName
      lastName
    }
    assignments {
      id
      eventVolunteer {
        id
        user {
          id
          firstName
          lastName
        }
      }
      status
      canCount
      checkIn {
        id
      }
    }
  }
}

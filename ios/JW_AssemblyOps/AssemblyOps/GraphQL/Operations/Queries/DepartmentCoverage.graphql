query DepartmentCoverage($departmentId: ID!) {
  departmentCoverage(departmentId: $departmentId) {
    post {
      id
      name
      capacity
      category
      location
      sortOrder
    }
    session {
      id
      name
      date
      startTime
      endTime
    }
    assignments {
      id
      volunteer {
        id
        firstName
        lastName
      }
      checkIn {
        id
        checkInTime
      }
      status
      forceAssigned
    }
    filled
    capacity
    isFilled
  }
}

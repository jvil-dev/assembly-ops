query AVEquipment($eventId: ID!, $category: AVEquipmentCategory, $areaId: ID) {
  avEquipment(eventId: $eventId, category: $category, areaId: $areaId) {
    id
    name
    model
    serialNumber
    category
    condition
    location
    notes
    area {
      id
      name
    }
    currentCheckout {
      id
      checkedOutBy {
        id
        user {
          firstName
          lastName
        }
      }
      checkedOutAt
      session {
        id
        name
      }
      notes
    }
    createdAt
    updatedAt
  }
}

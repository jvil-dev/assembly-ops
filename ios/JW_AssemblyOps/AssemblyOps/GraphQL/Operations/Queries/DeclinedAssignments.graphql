query DeclinedAssignments($eventId: ID, $departmentId: ID) {
    declinedAssignments(eventId: $eventId, departmentId: $departmentId) {
        id
        status
        declineReason
        respondedAt
        volunteer {
            id
            firstName
            lastName
            congregation
        }
        post {
            id
            name
            location
            department {
                id
                name
                departmentType
            }
        }
        session {
            id
            name
            date
            startTime
            endTime
        }
    }
}

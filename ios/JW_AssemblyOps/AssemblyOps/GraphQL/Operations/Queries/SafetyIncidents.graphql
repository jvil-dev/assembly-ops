query SafetyIncidents($eventId: ID!, $resolved: Boolean) {
  safetyIncidents(eventId: $eventId, resolved: $resolved) {
    id
    type
    description
    location
    post {
      id
      name
    }
    reportedBy {
      id
      user {
        firstName
        lastName
      }
    }
    resolved
    resolvedAt
    resolvedBy {
      id
      firstName
      lastName
    }
    resolutionNotes
    createdAt
  }
}

query MyAllEvents {
  myAllEvents {
    eventId
    membershipType
    overseerRole
    departmentId
    departmentName
    departmentType
    eventVolunteerId
    departmentAccessCode
    hierarchyRole
    event {
      id
      name
      eventType
      theme
      venue
      address
      startDate
      endDate
      volunteerCount
    }
  }
}

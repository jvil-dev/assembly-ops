query DepartmentInfo($departmentId: ID!) {
  departmentInfo(departmentId: $departmentId) {
    id
    name
    departmentType
    accessCode
    isPublic
    event {
      id
      name
      eventType
      venue
      startDate
      endDate
    }
    overseer {
      id
      user {
        id
        firstName
        lastName
      }
    }
    hierarchyRoles {
      id
      hierarchyRole
      eventVolunteer {
        id
        firstName
        lastName
      }
      assignedAt
    }
    volunteerCount
  }
}

query AVSafetyBriefings($eventId: ID!) {
  avSafetyBriefings(eventId: $eventId) {
    id
    topic
    notes
    conductedBy {
      id
      firstName
      lastName
    }
    conductedAt
    attendees {
      id
      eventVolunteer {
        id
        user {
          firstName
          lastName
        }
      }
    }
    attendeeCount
  }
}

query Circuits($region: String, $language: String) {
  circuits(region: $region, language: $language) {
    id
    code
    region
    language
  }
}

query CircuitByCode($code: String!) {
  circuitByCode(code: $code) {
    id
    code
    region
    language
    congregations {
      id
      name
    }
  }
}

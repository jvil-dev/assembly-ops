query MyConversations($eventId: ID!, $limit: Int, $offset: Int) {
  myConversations(eventId: $eventId, limit: $limit, offset: $offset) {
    id
    subject
    type
    departmentName
    unreadCount
    createdAt
    updatedAt
    lastMessage {
      id
      body
      senderName
      senderType
      createdAt
    }
    participants {
      id
      participantType
      participantId
      displayName
      phone
      congregation
      lastReadAt
    }
  }
}

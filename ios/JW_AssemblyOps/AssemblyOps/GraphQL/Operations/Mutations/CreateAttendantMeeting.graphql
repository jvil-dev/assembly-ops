mutation CreateAttendantMeeting($input: CreateAttendantMeetingInput!) {
  createAttendantMeeting(input: $input) {
    id
    session {
      id
      name
    }
    meetingDate
    notes
    attendees {
      id
      eventVolunteer {
        id
        volunteerProfile {
          firstName
          lastName
        }
      }
    }
    createdAt
  }
}

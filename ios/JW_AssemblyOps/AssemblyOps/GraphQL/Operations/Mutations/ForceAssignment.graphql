mutation ForceAssignment($input: ForceAssignmentInput!) {
  forceAssignment(input: $input) {
    assignment {
      id
      status
      forceAssigned
      volunteer {
        id
        firstName
        lastName
      }
      post {
        id
        name
      }
      session {
        id
        name
      }
    }
    warning
  }
}

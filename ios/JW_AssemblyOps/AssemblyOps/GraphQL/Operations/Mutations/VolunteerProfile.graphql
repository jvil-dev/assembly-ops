mutation AddVolunteerToEvent($input: AddVolunteerToEventInput!) {
  addVolunteerToEvent(input: $input) {
    eventVolunteer {
      id
      volunteerId
      user {
        id
        firstName
        lastName
      }
    }
    volunteerId
    token
    inviteMessage
  }
}

mutation AddVolunteerByUserId($eventId: ID!, $userId: String!, $departmentId: ID) {
  addVolunteerByUserId(eventId: $eventId, userId: $userId, departmentId: $departmentId) {
    eventVolunteer {
      id
      volunteerId
      user {
        id
        userId
        firstName
        lastName
      }
      department {
        id
        name
        departmentType
      }
    }
    volunteerId
    token
    inviteMessage
  }
}

mutation RegenerateVolunteerToken($eventVolunteerId: ID!) {
  regenerateVolunteerToken(eventVolunteerId: $eventVolunteerId) {
    eventVolunteer {
      id
      volunteerId
      user {
        id
        firstName
        lastName
      }
    }
    volunteerId
    token
    inviteMessage
  }
}

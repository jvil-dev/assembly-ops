mutation PromoteToAppAdmin($input: PromoteToAppAdminInput!) {
  promoteToAppAdmin(input: $input) {
    id
    role
    claimedAt
    admin {
      id
      firstName
      lastName
      email
    }
    event {
      id
      name
    }
    department {
      id
      name
      departmentType
    }
  }
}

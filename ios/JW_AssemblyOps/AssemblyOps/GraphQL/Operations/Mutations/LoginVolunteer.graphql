mutation LoginVolunteer($input: LoginEventVolunteerInput!) {
  loginEventVolunteer(input: $input) {
    eventVolunteer {
      id
      volunteerId
      volunteerProfile {
        firstName
        lastName
        email
        phone
        appointmentStatus
        congregation {
          name
        }
      }
      event {
        id
        name
        venue
        startDate
        endDate
        template {
          theme
        }
      }
      department {
        id
        name
        departmentType
      }
    }
    accessToken
    refreshToken
    expiresIn
  }
}

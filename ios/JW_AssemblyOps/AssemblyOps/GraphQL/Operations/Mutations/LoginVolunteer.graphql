mutation LoginVolunteer($input: LoginEventVolunteerInput!) {
  loginEventVolunteer(input: $input) {
    eventVolunteer {
      id
      volunteerId
      user {
        firstName
        lastName
        email
        phone
        appointmentStatus
      }
      event {
        id
        name
        venue
        startDate
        endDate
        theme
      }
      department {
        id
        name
        departmentType
      }
    }
    accessToken
    refreshToken
    expiresIn
  }
}

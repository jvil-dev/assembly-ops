mutation CompleteOAuthRegistration($input: CompleteOAuthRegistrationInput!) {
  completeOAuthRegistration(input: $input) {
    user {
      id
      userId
      email
      firstName
      lastName
      fullName
      isOverseer
      congregation
      congregationId
      congregationRef {
        id
        name
        state
        circuit {
          id
          code
        }
      }
    }
    accessToken
    refreshToken
    expiresIn
  }
}
